<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Privacy Policy - Pocket Expense Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #4f46e5, #22c55e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 720px;
      width: 100%;
      border-radius: 16px;
      padding: 32px 36px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      color: #1f2937;
      text-align: center;
    }

    p {
      font-size: 1rem;
      color: #374151;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .contact {
      margin-top: 24px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      font-size: 0.95rem;
      text-align: center;
      color: #4b5563;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
      }
      h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Privacy Policy</h1>

    <p><strong>Pocket Expense Tracker</strong> does not collect, store, or share any personal data.</p>

    <p>All expense records are stored locally on the user’s device only.</p>

    <p>The app does not require internet access and does not send any data to any server.</p>

    <div class="contact">
      Contact us: perkututngoceh96@gmail.com
    </div>
  </div>

</body>
</html>
